<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Dashboard</title>
    <th:block th:replace="~{fragments/style :: style}"></th:block>

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>👨‍💼 Employee</h2>

    <a href="/employee/dashboard" class="active">
        <i class="fa fa-home"></i> <span>Dashboard</span>
    </a>

    <a href="/products/employee/products">
        <i class="fa fa-box"></i> <span>Products</span>
    </a>

    <a href="/alerts/employee" style="justify-content:space-between;">
        <div style="display:flex; gap:10px;">
            <i class="fa fa-bell"></i> <span>Alerts</span>
        </div>

        <span th:if="${alertCount > 0}"
              class="badge-red"
              th:text="${alertCount}">
        </span>
    </a>

    <a href="/transactions/employee">
        <i class="fa fa-exchange-alt"></i> <span>Transactions</span>
    </a>

    <a href="/auth/logout">
        <i class="fa fa-sign-out-alt"></i> <span>Logout</span>
    </a>
</div>

<!-- CONTENT -->
<div class="content">

    <!-- TOPBAR -->
    <div class="topbar">
        <h2>🏠 Dashboard</h2>
        <span style="color:#64748b;">Overview of your workspace</span>
    </div>

    <!-- WELCOME CARD -->
    <div class="card" style="background:linear-gradient(135deg,#0ea5e9,#22c55e); color:white;">
        <h3>Welcome 👋</h3>
        <p>You can now manage products, view alerts, and track transactions.</p>
    </div>

    <!-- QUICK ACTION CARDS -->
    <div style="display:flex; gap:20px; margin-top:20px; flex-wrap:wrap;">

        <div class="card" style="flex:1; min-width:200px; text-align:center;">
            <i class="fa fa-box" style="font-size:24px; color:#2563eb;"></i>
            <h4>Products</h4>
            <p style="color:#64748b;">View & update stock</p>
        </div>

        <div class="card" style="flex:1; min-width:200px; text-align:center;">
            <i class="fa fa-bell" style="font-size:24px; color:#dc2626;"></i>
            <h4>Alerts</h4>
            <p style="color:#64748b;">Check important alerts</p>
        </div>

        <div class="card" style="flex:1; min-width:200px; text-align:center;">
            <i class="fa fa-exchange-alt" style="font-size:24px; color:#16a34a;"></i>
            <h4>Transactions</h4>
            <p style="color:#64748b;">Track stock movements</p>
        </div>

    </div>

</div>

</body>
</html>
