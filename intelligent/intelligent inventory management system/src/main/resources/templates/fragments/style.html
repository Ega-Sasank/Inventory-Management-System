<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        color: #1e293b;
    }

    /* SIDEBAR */
    .sidebar {
        width: 250px;
        height: 100vh;
        background: linear-gradient(180deg, #0f172a, #1e293b);
        color: white;
        position: fixed;
        padding-top: 20px;
        display: flex;
        flex-direction: column;
        box-shadow: 5px 0 25px rgba(0,0,0,0.2);
    }

    .sidebar h2 {
        text-align: center;
        font-weight: 600;
        margin-bottom: 30px;
        letter-spacing: 1px;
    }

    .sidebar a {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        padding: 12px 20px;
        color: #cbd5e1;
        text-decoration: none;
        border-radius: 12px;
        margin: 6px 12px;
        transition: all 0.3s ease;
        font-size: 15px;
    }

    .sidebar a:hover {
        background: rgba(255,255,255,0.08);
        color: white;
        transform: translateX(5px);
    }

    .sidebar a.active {
        background: #2563eb;
        color: white;
        box-shadow: 0 4px 12px rgba(37,99,235,0.4);
    }

    .sidebar i {
        font-size: 16px;
    }

    /* CONTENT */
    .content {
        margin-left: 250px;
        padding: 30px;
    }

    /* TOP BAR */
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    /* CARD */
    .card {
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        transition: all 0.3s ease;
        margin-bottom: 20px;
    }

    .card:hover {
        transform: translateY(-6px) scale(1.01);
    }

    /* KPI CARDS */
    .kpi {
        flex: 1;
        padding: 20px;
        border-radius: 18px;
        color: white;
        transition: 0.3s;
    }

    .kpi:hover {
        transform: scale(1.03);
    }

    .kpi h4 {
        margin: 0;
        font-weight: 400;
        opacity: 0.9;
    }

    .kpi h2 {
        margin: 10px 0 0;
        font-size: 26px;
    }

    /* BUTTON */
    button {
        padding: 10px 18px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(37,99,235,0.4);
    }

    /* INPUT */
    input, select {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ddd;
        width: 100%;
        transition: 0.2s;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 5px rgba(37,99,235,0.3);
    }

    /* TABLE */
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        overflow: hidden;
        border-radius: 12px;
    }

    th {
        background: linear-gradient(135deg, #1e293b, #334155);
        color: white;
        padding: 14px;
        font-weight: 500;
    }

    td {
        padding: 12px;
        border-bottom: 1px solid #eee;
    }

    tr:hover {
        background: #f1f5f9;
        transition: 0.2s;
    }

    /* BADGES */
    .badge-green {
        background: #dcfce7;
        color: #166534;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 500;
    }

    .badge-red {
        background: #fee2e2;
        color: #991b1b;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 500;
    }

    .badge-orange {
        background: #ffedd5;
        color: #9a3412;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 500;
    }

    /* SCROLLBAR (premium touch) */
    ::-webkit-scrollbar {
        width: 6px;
    }

    ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
    }

    /* ANIMATION */
    .card {
        animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
        from {opacity:0; transform:translateY(10px);}
        to {opacity:1; transform:translateY(0);}
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
        .sidebar {
            width: 100%;
            height: auto;
            position: relative;
        }

        .content {
            margin-left: 0;
        }
    }
</style>
