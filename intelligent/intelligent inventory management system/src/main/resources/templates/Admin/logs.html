<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Activity Logs</title>
    <th:block th:replace="~{fragments/style :: style}"></th:block>

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🚀 Inventra</h2>

    <a href="/admin/dashboard">
        <i class="fa fa-home"></i>
        <span>Dashboard</span>
    </a>

    <a href="/admin/logs" class="active">
        <i class="fa fa-clock"></i>
        <span>Activity Logs</span>
    </a>

    <a href="/auth/logout">
        <i class="fa fa-sign-out-alt"></i>
        <span>Logout</span>
    </a>
</div>

<!-- CONTENT -->
<div class="content">

    <!-- TOPBAR -->
    <div class="topbar">
        <h2>📜 Activity Logs</h2>
        <span style="color:#64748b;">Track system activity</span>
    </div>

    <!-- CARD -->
    <div class="card">

        <!-- SEARCH BAR -->
        <form method="get"
              style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;">

            <input type="text"
                   name="username"
                   placeholder="🔍 Filter by Username"
                   style="max-width:250px;" />

            <button type="submit">
                <i class="fa fa-search"></i> Search
            </button>

        </form>

        <!-- EMPTY STATE -->
        <div th:if="${#lists.isEmpty(logs)}"
             style="text-align:center; padding:30px; color:#64748b;">
            <i class="fa fa-folder-open" style="font-size:40px;"></i>
            <p>No logs found</p>
        </div>

        <!-- TABLE -->
        <table th:if="${!#lists.isEmpty(logs)}">

            <thead>
            <tr>
                <th>User</th>
                <th>Action</th>
                <th>Time</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="log : ${logs}">

                <td>
                    <span class="badge-green"
                          th:text="${log.username}">
                    </span>
                </td>

                <td>
                    <span class="badge-orange"
                          th:text="${log.action}">
                    </span>
                </td>

                <td th:text="${log.timestamp}"></td>

            </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
