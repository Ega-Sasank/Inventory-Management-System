<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Products</title>
    <th:block th:replace="~{fragments/style :: style}"></th:block>
</head>
<body>

<div class="sidebar">
    <h2>Admin Panel</h2>
    <a href="/admin/dashboard">Dashboard</a>
    <a href="/products/admin/products">Products</a>
    <a href="/alerts/admin">
        Alerts
        <span th:if="${alertCount > 0}"
              style="background:red;
                 color:white;
                 padding:2px 6px;
                 border-radius:10px;
                 font-size:12px;
                 margin-left:5px;">
        <span th:text="${alertCount}"></span>
    </span>
    </a>
    <a href="/transactions/admin">Transactions</a>
    <a href="/auth/logout">Logout</a>
</div>

<div class="content">

    <div class="card">
        <!--<h3>Add Product</h3>

        <form th:action="@{/products/add}" method="post" th:object="${product}">-->
        <h3 th:text="${product.productId == null} ? 'Add Product' : 'Update Product'"></h3>

        <form th:action="${product.productId == null} ?
        @{/products/add} :
        @{/products/admin/update}"
              method="post"
              th:object="${product}">

            <input type="hidden" th:field="*{productId}" />
            <input type="text" placeholder="SKU" th:field="*{sku}" required>
            <input type="text" placeholder="Name" th:field="*{name}" required>
            <input type="text" placeholder="Category" th:field="*{category}">
            <input type="text" placeholder="Supplier" th:field="*{supplier}">
            <input type="number" placeholder="Unit Price" th:field="*{unitPrice}">
            <input type="number" placeholder="Initial Stock" th:field="*{stockQuantity}">
            <input type="number" placeholder="Min Stock Level" th:field="*{minStockLevel}">
            <!--<button type="submit">Add Product</button>-->
            <button type="submit"
                    th:text="${product.productId == null} ? 'Add Product' : 'Update Product'">
            </button>
        </form>
    </div>

    <!-- SWITCH BUTTONS -->
    <div style="margin-bottom:15px;margin-top:20px;">

        <button onclick="showActive()"
                style="background:#2563eb;color:white;padding:6px 14px;border:none;border-radius:5px;">
            Active Products
        </button>

        <button onclick="showDeleted()"
                style="background:#dc2626;color:white;padding:6px 14px;border:none;border-radius:5px;margin-left:10px;">
            Deleted Products
        </button>

    </div>


    <!-- ACTIVE PRODUCTS -->
    <div id="activeProducts" class="card">

        <h3>Active Products</h3>

        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Stock</th>
                <th>Actions</th>
            </tr>

            <tr th:each="p : ${products}">
                <td th:text="${p.productId}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.category}"></td>
                <td th:text="${p.stockQuantity}"></td>

                <td>
                    <a th:href="@{/products/admin/edit/{id}(id=${p.productId})}"
                       style="color:blue;">Edit</a>
                    |
                    <a th:href="@{/products/admin/delete/{id}(id=${p.productId})}"
                       onclick="return confirm('Are you sure you want to delete this product?');"
                       style="color:red;">
                        Delete
                    </a>
                </td>
            </tr>

        </table>

    </div>



    <!-- DELETED PRODUCTS -->
    <div id="deletedProducts" class="card" style="display:none;">

        <h3 style="color:#dc2626;">Deleted Products</h3>

        <table>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            <tr th:each="p : ${deletedProducts}">

                <td th:text="${p.productId}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.category}"></td>

                <td style="color:red;font-weight:bold;">
                    INACTIVE
                </td>

                <td>

                    <form th:action="@{/products/admin/restore/{id}(id=${p.productId})}"
                          method="post"
                          style="display:flex;gap:6px;align-items:center;">

                        <input type="number"
                               name="quantity"
                               placeholder="Stock"
                               required
                               style="width:80px">

                        <button type="submit"
                                style="background:#16a34a;
                           color:white;
                           border:none;
                           padding:4px 10px;
                           border-radius:5px;">
                            Restore
                        </button>

                    </form>

                </td>

            </tr>

        </table>

    </div>




</div>
<!-- TOGGLE SCRIPT -->
<script>

    function showActive(){
        document.getElementById("activeProducts").style.display="block";
        document.getElementById("deletedProducts").style.display="none";
    }

    function showDeleted(){
        document.getElementById("activeProducts").style.display="none";
        document.getElementById("deletedProducts").style.display="block";
    }

</script>


</body>
</html>
