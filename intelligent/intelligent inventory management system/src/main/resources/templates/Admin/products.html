<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Products</title>
    <th:block th:replace="~{fragments/style :: style}"></th:block>

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🚀 Inventra</h2>

    <a href="/admin/dashboard">
        <i class="fa fa-home"></i> <span>Dashboard</span>
    </a>

    <a href="/products/admin/products" class="active">
        <i class="fa fa-box"></i> <span>Products</span>
    </a>

    <a href="/alerts/admin" style="justify-content:space-between;">
        <div style="display:flex; gap:10px;">
            <i class="fa fa-bell"></i> <span>Alerts</span>
        </div>
        <span th:if="${alertCount > 0}" class="badge-red"
              th:text="${alertCount}"></span>
    </a>

    <a href="/transactions/admin">
        <i class="fa fa-exchange-alt"></i> <span>Transactions</span>
    </a>

    <a href="/auth/logout">
        <i class="fa fa-sign-out-alt"></i> <span>Logout</span>
    </a>
</div>

<!-- CONTENT -->
<div class="content">

    <!-- TOPBAR -->
    <div class="topbar">
        <h2>📦 Product Management</h2>
        <span style="color:#64748b;">Manage inventory and products</span>
    </div>

    <!-- FORM CARD -->
    <div class="card">

        <h3 th:text="${product.productId == null} ? '➕ Add Product' : '✏ Update Product'"></h3>

        <form th:action="${product.productId == null} ? @{/products/add} : @{/products/admin/update}"
              method="post"
              th:object="${product}"
              style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px;">

            <input type="hidden" th:field="*{productId}" />

            <input type="text" placeholder="SKU" th:field="*{sku}" required>
            <input type="text" placeholder="Name" th:field="*{name}" required>
            <input type="text" placeholder="Category" th:field="*{category}">
            <input type="text" placeholder="Supplier" th:field="*{supplier}">
            <input type="number" placeholder="Unit Price" th:field="*{unitPrice}">
            <input type="number" placeholder="Stock Quantity" th:field="*{stockQuantity}">
            <input type="number" placeholder="Min Stock Level" th:field="*{minStockLevel}">

            <div style="grid-column: span 2;">
                <button type="submit">
                    <i class="fa fa-save"></i>
                    <span th:text="${product.productId == null} ? 'Add Product' : 'Update Product'"></span>
                </button>
            </div>

        </form>

    </div>

    <!-- SWITCH BUTTONS -->
    <div style="margin:20px 0; display:flex; gap:10px;">
        <button onclick="showActive()">
            <i class="fa fa-list"></i> Active
        </button>

        <button onclick="showDeleted()" style="background:#dc2626;">
            <i class="fa fa-trash"></i> Deleted
        </button>
    </div>

    <!-- ACTIVE PRODUCTS -->
    <div id="activeProducts" class="card">

        <h3>Active Products</h3>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Stock</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p : ${products}">

                <td th:text="${p.productId}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.category}"></td>

                <td>
                    <span th:text="${p.stockQuantity}"
                          th:classappend="${p.stockQuantity < p.minStockLevel} ? 'badge-red' : 'badge-green'">
                    </span>
                </td>

                <td style="display:flex; gap:10px; justify-content:center;">

                    <a th:href="@{/products/admin/edit/{id}(id=${p.productId})}"
                       style="color:#2563eb;">
                        <i class="fa fa-edit"></i>
                    </a>

                    <a th:href="@{/products/admin/delete/{id}(id=${p.productId})}"
                       onclick="return confirm('Delete this product?');"
                       style="color:#dc2626;">
                        <i class="fa fa-trash"></i>
                    </a>

                </td>

            </tr>
            </tbody>
        </table>

    </div>

    <!-- DELETED PRODUCTS -->
    <div id="deletedProducts" class="card" style="display:none;">

        <h3 style="color:#dc2626;">Deleted Products</h3>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Status</th>
                <th>Restore</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p : ${deletedProducts}">

                <td th:text="${p.productId}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.category}"></td>

                <td>
                    <span class="badge-red">Inactive</span>
                </td>

                <td>
                    <form th:action="@{/products/admin/restore/{id}(id=${p.productId})}"
                          method="post"
                          style="display:flex; gap:10px;">

                        <input type="number" name="quantity" placeholder="Stock" required style="width:80px">

                        <button type="submit" style="background:#16a34a;">
                            <i class="fa fa-undo"></i>
                        </button>

                    </form>
                </td>

            </tr>
            </tbody>
        </table>

    </div>

</div>

<!-- TOGGLE SCRIPT -->
<script>
    function showActive(){
        document.getElementById("activeProducts").style.display="block";
        document.getElementById("deletedProducts").style.display="none";
    }

    function showDeleted(){
        document.getElementById("activeProducts").style.display="none";
        document.getElementById("deletedProducts").style.display="block";
    }
</script>

</body>
</html>
