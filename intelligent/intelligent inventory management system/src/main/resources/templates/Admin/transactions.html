<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Transactions</title>
    <th:block th:replace="~{fragments/style :: style}"></th:block>

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🚀 Inventra</h2>

    <a href="/admin/dashboard">
        <i class="fa fa-home"></i> <span>Dashboard</span>
    </a>

    <a href="/products/admin/products">
        <i class="fa fa-box"></i> <span>Products</span>
    </a>

    <a href="/alerts/admin" style="justify-content:space-between;">
        <div style="display:flex; gap:10px;">
            <i class="fa fa-bell"></i> <span>Alerts</span>
        </div>
        <span th:if="${alertCount > 0}" class="badge-red"
              th:text="${alertCount}"></span>
    </a>

    <a href="/transactions/admin" class="active">
        <i class="fa fa-exchange-alt"></i> <span>Transactions</span>
    </a>

    <a href="/auth/logout">
        <i class="fa fa-sign-out-alt"></i> <span>Logout</span>
    </a>
</div>

<!-- CONTENT -->
<div class="content">

    <!-- TOPBAR -->
    <div class="topbar">
        <h2>💳 Transactions</h2>
        <span style="color:#64748b;">Track all stock movements</span>
    </div>

    <div class="card">

        <!-- SEARCH + ACTION BAR -->
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:20px;">

            <!-- SEARCH -->
            <form th:action="@{/transactions/admin}" method="get"
                  style="display:flex; gap:10px; flex-wrap:wrap;">

                <input type="number"
                       name="productId"
                       placeholder="🔍 Product ID"
                       style="max-width:200px;" />

                <button type="submit">
                    <i class="fa fa-search"></i>
                </button>

                <a th:href="@{/transactions/admin}"
                   style="align-self:center; color:#2563eb;">
                    Reset
                </a>

            </form>

            <!-- DOWNLOAD -->
            <a th:href="@{/transactions/admin/report(productId=${param.productId})}"
               style="background:#2563eb;
                      color:white;
                      padding:8px 14px;
                      border-radius:8px;
                      text-decoration:none;">
                <i class="fa fa-download"></i> PDF
            </a>

        </div>

        <!-- EMPTY STATE -->
        <div th:if="${#lists.isEmpty(transactions)}"
             style="text-align:center; padding:30px; color:#64748b;">
            <i class="fa fa-file-alt" style="font-size:40px;"></i>
            <p>No transactions found</p>
        </div>

        <!-- TABLE -->
        <table th:if="${!#lists.isEmpty(transactions)}">

            <thead>
            <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Qty</th>
                <th>Time</th>
                <th>Product</th>
                <th>Name</th>
                <th>User</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="t : ${transactions}">

                <td th:text="${t.id}"></td>

                <!-- TYPE BADGE -->
                <td>
                    <span th:if="${t.type == 'STOCK_IN'}"
                          class="badge-green">IN</span>

                    <span th:if="${t.type == 'STOCK_OUT'}"
                          class="badge-red">OUT</span>
                </td>

                <td th:text="${t.quantity}"></td>

                <td th:text="${t.timestamp}"></td>

                <td>
                    #<span th:text="${t.product.productId}"></span>
                </td>

                <td th:text="${t.product.name}"></td>

                <td>
                    <span class="badge-orange"
                          th:text="${t.performedByUser}">
                    </span>
                </td>

            </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
